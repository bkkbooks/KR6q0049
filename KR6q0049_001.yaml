body:
  text: 先覺集序學佛然後知儒此碩儒之論也古人與麼道即便與麼讚是誠先覺之公心今人不知佛之所以為佛儒之所以為儒不過分門別戶逐影循聲焉爾世尊云天上天下惟我獨尊且道如何是我夫子曰吾道一以貫之且道如何是一打頭一著不能明了祇從形迹中論枝葉上觀豈非門外歟哲人達士學有本據道有實悟世出世間初無二致自覺覺他罔有差殊或現比丘比丘尼優婆塞優婆夷或現宰官長者婆羅門居士隨其緣會所至即導利乎羣品克垂範於後昆夫是之謂先覺一機一境一話一言可以開闢人天正眼顯揚儒佛心宗先覺集之所由著也明潛陶公輯先覺集而祇存居士者何蓋緣建立維摩之院供其位即考其入道之由所以與雲居和尚暨同道諸君參詳訂證而成此言雖未咸備已露一斑厥功懋哉其中大意既宣之於中山記矣欲以是集鑴登梨棗問敘於余更為申明其說旹康熈十八年歲在己未夏六月傳臨濟正宗三十二世道安靜和尚撰先覺集序從上以來佛祖聖賢諸位菩薩說種種法演種種教皆是鏡中煙塵夢裏幻事本無實法繫綴于人所以大覺世尊道吾四十九年未曾說著一字是真實語又古人道大千沙界海中漚一切聖賢如電拂者裏何曾有佛有法有僧有俗有覺未覺不見道未離兜率已降王宮未出母胎度人已畢斯乃先覺誌䟽陶明潛解得此義纂先覺集欲行於世乞序于予予以從上古錐掀翻一上會得者作如是觀不會者切忌向先覺集中絆倒旹康熈丙寅佛成道日盤山青溝拙菴智朴撰先覺集序夫繼天立極之道不異乎禪垂世立教之書統歸乎理道非言而不著理非事而不明所以儒有墳典經史諸子百家以至稗官小說各各有宗趣焉惟吾釋門因西天東土之文北教南宗之旨旁流正出散聖異人分支別派授受淵源幸存簡牘考實之徵不致紊亂傳燈誵訛繼席益信一切語言三昧內外典集皆為載道之器傳遠之用也有惠後昆功不細矣茲明潛陶居士從學多年執勞甚久苦參實究歷徧辛酸涉水登山悉知泠暖于壬子冬忽然有省于海會室中未幾辭往中山寺薙草耕雲跏趺𨳲影不聞塵事復檢殘編遂纂先覺集二卷編敘優婆塞夷從上諸公乞余弁言為不覺喟然而嘆居士身說法仍以居士身供養未審鼻祖西來供養有幾始知彰顯正教全在乎人非其人而不能弘其道非其道而不能知其人而名實全備于天下者匪至人而誰能之但緝書紀事之任若不洞究先覺佛理之精芟補切難要免闕遺恐二乘見地翻以庭前瑞草之誚凡吾同儕必攝無礙觀觀之便知十世古今不離當念塵影起滅何足記哉自然舉目視而有欲皆充信手拈而有疾皆愈同瞻緇素廣播名藍先哲不孤晚參可托真勝事也故敢引紙運墨聊為碧眼鉄漢一勗云爾旹康熈丁卯春王吉日圓教解三洪撰
